  <circle cx="70" cy="56" r="2" fill="currentColor" stroke="none" fill-opacity="0.7"/>

  <!-- box 2 -->
  <line x1="118" y1="78" x2="118" y2="138" stroke-opacity="0.7"/>
  <line x1="112" y1="78" x2="124" y2="78" stroke-opacity="0.7"/>
  <line x1="112" y1="138" x2="124" y2="138" stroke-opacity="0.7"/>
  <rect x="104" y="96" width="28" height="28" fill="currentColor" stroke="currentColor" fill-opacity="0.2"/>
  <line x1="104" y1="114" x2="132" y2="114" stroke-width="2" stroke-opacity="0.9"/>

  <!-- box 3 (wider spread, skewed) -->
  <line x1="166" y1="56" x2="166" y2="148" stroke-opacity="0.7"/>
  <line x1="160" y1="56" x2="172" y2="56" stroke-opacity="0.7"/>
  <line x1="160" y1="148" x2="172" y2="148" stroke-opacity="0.7"/>
  <rect x="152" y="78" width="28" height="42" fill="currentColor" stroke="currentColor" fill-opacity="0.2"/>
  <line x1="152" y1="88" x2="180" y2="88" stroke-width="2" stroke-opacity="0.9"/>
  <circle cx="166" cy="48" r="2" fill="currentColor" stroke="none" fill-opacity="0.7"/>
  <circle cx="166" cy="156" r="2" fill="currentColor" stroke="none" fill-opacity="0.7"/>

  <!-- box 4 -->
  <line x1="214" y1="84" x2="214" y2="132" stroke-opacity="0.7"/>
  <line x1="208" y1="84" x2="220" y2="84" stroke-opacity="0.7"/>
  <line x1="208" y1="132" x2="220" y2="132" stroke-opacity="0.7"/>
  <rect x="200" y="98" width="28" height="22" fill="currentColor" stroke="currentColor" fill-opacity="0.2"/>
  <line x1="200" y1="110" x2="228" y2="110" stroke-width="2" stroke-opacity="0.9"/>

  <!-- box 5 -->
  <line x1="262" y1="72" x2="262" y2="144" stroke-opacity="0.7"/>
  <line x1="256" y1="72" x2="268" y2="72" stroke-opacity="0.7"/>
  <line x1="256" y1="144" x2="268" y2="144" stroke-opacity="0.7"/>
  <rect x="248" y="86" width="28" height="38" fill="currentColor" stroke="currentColor" fill-opacity="0.2"/>
  <line x1="248" y1="104" x2="276" y2="104" stroke-width="2" stroke-opacity="0.9"/>
  <circle cx="262" cy="152" r="2" fill="currentColor" stroke="none" fill-opacity="0.7"/>
</g>

<!-- category ticks -->
<g fill="currentColor" stroke="none" fill-opacity="0.5">
  <rect x="62" y="164" width="16" height="3" rx="1"/>
  <rect x="110" y="164" width="16" height="3" rx="1"/>
  <rect x="158" y="164" width="16" height="3" rx="1"/>
  <rect x="206" y="164" width="16" height="3" rx="1"/>
  <rect x="254" y="164" width="16" height="3" rx="1"/>
</g>
</svg>
