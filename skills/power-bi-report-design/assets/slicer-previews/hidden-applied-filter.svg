  </g>
  <!-- filter row 2: visible + locked -->
  <g>
    <rect x="24" y="94" width="80" height="4" rx="2" fill-opacity="0.7"/>
    <g stroke="currentColor" stroke-opacity="0.85" fill="none" stroke-width="1.4">
      <path d="M124 98 Q130 92 136 98 Q130 104 124 98 Z"/>
