<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
<rect x="0.5" y="0.5" width="319" height="179" rx="6" stroke-opacity="0.25"/>
<rect x="12" y="12" width="110" height="6" rx="3" fill="currentColor" stroke="none" fill-opacity="0.55"/>
<rect x="12" y="22" width="170" height="4" rx="2" fill="currentColor" stroke="none" fill-opacity="0.25"/>

<!-- treemap container -->
<g stroke="currentColor" stroke-width="2" stroke-opacity="0.9">
  <!-- biggest: top-left -->
  <rect x="20" y="44" width="160" height="76" fill="currentColor" fill-opacity="0.55"/>
  <!-- second: top-right -->
  <rect x="180" y="44" width="90" height="76" fill="currentColor" fill-opacity="0.4"/>
  <!-- third: right-far -->
  <rect x="270" y="44" width="30" height="44" fill="currentColor" fill-opacity="0.3"/>
  <rect x="270" y="88" width="30" height="32" fill="currentColor" fill-opacity="0.22"/>

  <!-- bottom row -->
  <rect x="20" y="120" width="70" height="44" fill="currentColor" fill-opacity="0.28"/>
  <rect x="90" y="120" width="50" height="44" fill="currentColor" fill-opacity="0.2"/>
  <rect x="140" y="120" width="60" height="44" fill="currentColor" fill-opacity="0.18"/>
  <rect x="200" y="120" width="70" height="44" fill="currentColor" fill-opacity="0.15"/>
  <rect x="270" y="120" width="30" height="44" fill="currentColor" fill-opacity="0.12"/>
</g>

<!-- labels on large tiles -->
<g fill="#fff" stroke="none" fill-opacity="0.95">
  <rect x="28" y="54" width="50" height="5" rx="2"/>
  <rect x="28" y="64" width="34" height="4" rx="2" fill-opacity="0.75"/>

  <rect x="188" y="54" width="42" height="5" rx="2"/>
  <rect x="188" y="64" width="28" height="4" rx="2" fill-opacity="0.75"/>
</g>

<!-- labels on medium tiles -->
<g fill="currentColor" stroke="none" fill-opacity="0.85">
  <rect x="28" y="130" width="36" height="4" rx="2"/>
  <rect x="28" y="138" width="24" height="3" rx="1" fill-opacity="0.6"/>

  <rect x="98" y="130" width="28" height="4" rx="2"/>

  <rect x="148" y="130" width="28" height="4" rx="2"/>

  <rect x="208" y="130" width="32" height="4" rx="2"/>
</g>
</svg>
