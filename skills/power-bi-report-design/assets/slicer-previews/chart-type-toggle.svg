      <rect x="56" y="114" width="14" height="36" rx="1"/>
      <rect x="76" y="108" width="14" height="42" rx="1"/>
      <rect x="96" y="118" width="14" height="32" rx="1"/>
      <rect x="116" y="104" width="14" height="46" rx="1"/>
