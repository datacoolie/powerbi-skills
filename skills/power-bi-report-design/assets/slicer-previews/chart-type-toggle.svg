  <g stroke="currentColor" stroke-opacity="0.7" fill="none" stroke-width="1.3">
    <rect x="288" y="50" width="9" height="7" rx="1.5"/>
    <path d="M289.5 50 V47 Q289.5 44.5 292.5 44.5 Q295.5 44.5 295.5 47 V50"/>
