<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
<style id="preview-theme">
  svg { color: #24292f; background: #ffffff; }
  @media (prefers-color-scheme: dark) {
    svg { color: #e6edf3; background: #0d1117; }
  }
</style>
<rect x="0.5" y="0.5" width="319" height="179" rx="6" stroke-opacity="0.25"/>

<g fill="currentColor" stroke="none" fill-opacity="0.55">
  <rect x="12" y="12" width="110" height="6" rx="3"/>
  <rect x="12" y="22" width="170" height="4" rx="2" fill-opacity="0.25"/>
</g>

<g font-family="system-ui,Segoe UI,Arial" fill="currentColor" stroke="none">
  <!-- label -->
  <rect x="24" y="54" width="68" height="4" rx="2" fill-opacity="0.45"/>

  <!-- min input -->
  <rect x="24" y="70" width="56" height="20" rx="3" fill-opacity="0.08"/>
  <rect x="24.5" y="70.5" width="55" height="19" rx="3" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
  <rect x="34" y="77" width="28" height="6" rx="2" fill-opacity="0.8"/>

  <!-- max input -->
  <rect x="240" y="70" width="56" height="20" rx="3" fill-opacity="0.08"/>
  <rect x="240.5" y="70.5" width="55" height="19" rx="3" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
  <rect x="250" y="77" width="36" height="6" rx="2" fill-opacity="0.8"/>

  <!-- histogram behind slider -->
  <g fill-opacity="0.18">
    <rect x="40" y="108" width="12" height="22" rx="1"/>
    <rect x="56" y="100" width="12" height="30" rx="1"/>
    <rect x="72" y="92" width="12" height="38" rx="1"/>
    <rect x="88" y="84" width="12" height="46" rx="1"/>
    <rect x="104" y="78" width="12" height="52" rx="1"/>
    <rect x="120" y="82" width="12" height="48" rx="1"/>
    <rect x="136" y="90" width="12" height="40" rx="1"/>
    <rect x="152" y="98" width="12" height="32" rx="1"/>
    <rect x="168" y="104" width="12" height="26" rx="1"/>
    <rect x="184" y="110" width="12" height="20" rx="1"/>
    <rect x="200" y="116" width="12" height="14" rx="1"/>
    <rect x="216" y="120" width="12" height="10" rx="1"/>
    <rect x="232" y="124" width="12" height="6" rx="1"/>
    <rect x="248" y="126" width="12" height="4" rx="1"/>
    <rect x="264" y="128" width="12" height="2" rx="1"/>
  </g>

  <!-- track -->
  <line x1="40" y1="138" x2="280" y2="138" stroke="currentColor" stroke-opacity="0.3" stroke-width="2"/>
  <line x1="88" y1="138" x2="196" y2="138" stroke="currentColor" stroke-opacity="0.85" stroke-width="3"/>

  <!-- thumbs -->
  <circle cx="88" cy="138" r="8" fill-opacity="0.95"/>
  <circle cx="196" cy="138" r="8" fill-opacity="0.95"/>

  <!-- axis labels -->
  <g fill-opacity="0.35">
    <rect x="32" y="156" width="18" height="3" rx="1"/>
    <rect x="150" y="156" width="24" height="3" rx="1"/>
    <rect x="270" y="156" width="22" height="3" rx="1"/>
  </g>
</g>
</svg>
