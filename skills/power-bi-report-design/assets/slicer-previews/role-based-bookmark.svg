<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
<style id="preview-theme">
  svg { color: #24292f; background: #ffffff; }
  @media (prefers-color-scheme: dark) {
    svg { color: #e6edf3; background: #0d1117; }
  }
</style>
<rect x="0.5" y="0.5" width="319" height="179" rx="6" stroke-opacity="0.25"/>

<g fill="currentColor" stroke="none" fill-opacity="0.55">
  <rect x="12" y="12" width="110" height="6" rx="3"/>
  <rect x="12" y="22" width="170" height="4" rx="2" fill-opacity="0.25"/>
</g>

<g font-family="system-ui,Segoe UI,Arial" fill="currentColor" stroke="none">
  <!-- canvas -->
  <rect x="16" y="46" width="288" height="122" rx="3" fill-opacity="0.06"/>
  <rect x="16.5" y="46.5" width="287" height="121" rx="3" fill="none" stroke="currentColor" stroke-opacity="0.45"/>

  <!-- label -->
  <rect x="24" y="56" width="50" height="4" rx="2" fill-opacity="0.55"/>

  <!-- button group: active "My Region" + outline "All Regions" -->
  <rect x="82" y="50" width="86" height="22" rx="11" fill-opacity="0.9"/>
  <rect x="98" y="59" width="54" height="5" rx="2" fill="#fff" fill-opacity="0.95"/>

  <rect x="176" y="50" width="96" height="22" rx="11" fill-opacity="0.1"/>
  <rect x="176.5" y="50.5" width="95" height="21" rx="11" fill="none" stroke="currentColor" stroke-opacity="0.6"/>
  <rect x="190" y="59" width="64" height="5" rx="2" fill-opacity="0.65"/>

  <!-- dashed arrow from button to page -->
  <g stroke-opacity="0.55" stroke-dasharray="3 3" stroke-width="1.3" fill="none">
    <path d="M125 76 C 125 94, 90 94, 90 110"/>
  </g>

  <!-- "bookmark" tag -->
  <g transform="translate(36,88)" stroke-opacity="0.7" stroke-width="1.3" fill="none">
    <path d="M0 0 h22 v14 l-11 -6 l-11 6 z"/>
  </g>

  <!-- scoped page content -->
  <g fill-opacity="0.45">
    <rect x="68" y="92" width="52" height="4" rx="2"/>
    <rect x="68" y="102" width="36" height="10" rx="2" fill-opacity="0.85"/>

    <rect x="68" y="124" width="10" height="28" rx="1"/>
    <rect x="82" y="118" width="10" height="34" rx="1" fill-opacity="0.65"/>
    <rect x="96" y="112" width="10" height="40" rx="1" fill-opacity="0.8"/>
    <rect x="110" y="126" width="10" height="26" rx="1"/>
  </g>

  <!-- second panel hidden in this bookmark (ghosted) -->
  <g fill-opacity="0.12">
    <rect x="148" y="92" width="148" height="60" rx="3"/>
    <rect x="156" y="102" width="80" height="4" rx="2"/>
    <polyline points="156,140 170,130 184,134 198,124 212,130 226,118 240,124 254,114 268,120 282,110 296,116"
              fill="none" stroke="currentColor" stroke-opacity="0.4" stroke-width="1.2"/>
  </g>
  <rect x="148.5" y="92.5" width="147" height="59" rx="3" stroke="currentColor" stroke-opacity="0.3" stroke-dasharray="3 3" fill="none"/>
</g>
</svg>
