<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
<rect x="0.5" y="0.5" width="319" height="179" rx="6" stroke-opacity="0.25"/>

<g fill="currentColor" stroke="none" fill-opacity="0.55">
  <rect x="12" y="12" width="110" height="6" rx="3"/>
  <rect x="12" y="22" width="170" height="4" rx="2" fill-opacity="0.25"/>
</g>

<g font-family="system-ui,Segoe UI,Arial" fill="currentColor" stroke="none">
  <!-- label -->
  <rect x="24" y="50" width="48" height="4" rx="2" fill-opacity="0.45"/>

  <!-- direction pill: Last | Next | This -->
  <rect x="24" y="66" width="150" height="24" rx="12" fill-opacity="0.06"/>
  <rect x="24.5" y="66.5" width="149" height="23" rx="12" fill="none" stroke="currentColor" stroke-opacity="0.45"/>
  <!-- active "Last" -->
  <rect x="28" y="70" width="44" height="16" rx="8" fill-opacity="0.9"/>
  <rect x="38" y="76" width="24" height="4" rx="2" fill="#fff" fill-opacity="0.9"/>
  <!-- Next -->
  <rect x="78" y="76" width="28" height="4" rx="2" fill-opacity="0.5"/>
  <!-- This -->
  <rect x="132" y="76" width="28" height="4" rx="2" fill-opacity="0.5"/>

  <!-- count box -->
  <rect x="190" y="66" width="36" height="24" rx="3" fill-opacity="0.08"/>
  <rect x="190.5" y="66.5" width="35" height="23" rx="3" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
  <rect x="200" y="75" width="16" height="6" rx="2" fill-opacity="0.8"/>

  <!-- unit dropdown -->
  <rect x="232" y="66" width="64" height="24" rx="3" fill-opacity="0.08"/>
  <rect x="232.5" y="66.5" width="63" height="23" rx="3" fill="none" stroke="currentColor" stroke-opacity="0.5"/>
  <rect x="240" y="76" width="36" height="4" rx="2" fill-opacity="0.65"/>
  <polyline points="282,76 286,80 290,76" fill="none" stroke="currentColor" stroke-opacity="0.55" stroke-width="1.3"/>

  <!-- preview strip -->
  <rect x="24" y="110" width="272" height="40" rx="3" fill-opacity="0.04"/>
  <rect x="24.5" y="110.5" width="271" height="39" rx="3" fill="none" stroke="currentColor" stroke-opacity="0.25"/>

  <!-- timeline ticks -->
  <line x1="36" y1="140" x2="284" y2="140" stroke="currentColor" stroke-opacity="0.3"/>
  <g stroke-opacity="0.35">
    <line x1="40" y1="136" x2="40" y2="144"/>
    <line x1="60" y1="136" x2="60" y2="144"/>
    <line x1="80" y1="136" x2="80" y2="144"/>
    <line x1="100" y1="136" x2="100" y2="144"/>
    <line x1="120" y1="136" x2="120" y2="144"/>
    <line x1="140" y1="136" x2="140" y2="144"/>
    <line x1="160" y1="136" x2="160" y2="144"/>
    <line x1="180" y1="136" x2="180" y2="144"/>
    <line x1="200" y1="136" x2="200" y2="144"/>
    <line x1="220" y1="136" x2="220" y2="144"/>
    <line x1="240" y1="136" x2="240" y2="144"/>
    <line x1="260" y1="136" x2="260" y2="144"/>
    <line x1="280" y1="136" x2="280" y2="144"/>
  </g>
  <!-- highlighted window (last 12 of 13 ticks -> 40..280) -->
  <rect x="60" y="124" width="220" height="20" rx="2" fill-opacity="0.2"/>
  <!-- "today" marker -->
  <circle cx="280" cy="134" r="3" fill-opacity="0.95"/>
</g>
</svg>
