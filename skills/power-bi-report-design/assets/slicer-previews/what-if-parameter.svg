<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
<rect x="0.5" y="0.5" width="319" height="179" rx="6" stroke-opacity="0.25"/>

<g fill="currentColor" stroke="none" fill-opacity="0.55">
  <rect x="12" y="12" width="110" height="6" rx="3"/>
  <rect x="12" y="22" width="170" height="4" rx="2" fill-opacity="0.25"/>
</g>

<g font-family="system-ui,Segoe UI,Arial" fill="currentColor" stroke="none">
  <!-- 3 what-if sliders -->
  <g>
    <rect x="20" y="50" width="60" height="3" rx="1" fill-opacity="0.55"/>
    <rect x="132" y="50" width="36" height="4" rx="2" fill-opacity="0.85"/>
    <line x1="20" y1="62" x2="168" y2="62" stroke="currentColor" stroke-opacity="0.3" stroke-width="2"/>
    <line x1="20" y1="62" x2="84" y2="62" stroke="currentColor" stroke-opacity="0.85" stroke-width="3"/>
    <circle cx="84" cy="62" r="6" fill-opacity="0.95"/>
  </g>
  <g>
    <rect x="20" y="78" width="60" height="3" rx="1" fill-opacity="0.55"/>
    <rect x="132" y="78" width="36" height="4" rx="2" fill-opacity="0.85"/>
    <line x1="20" y1="90" x2="168" y2="90" stroke="currentColor" stroke-opacity="0.3" stroke-width="2"/>
    <line x1="20" y1="90" x2="120" y2="90" stroke="currentColor" stroke-opacity="0.85" stroke-width="3"/>
    <circle cx="120" cy="90" r="6" fill-opacity="0.95"/>
  </g>
  <g>
    <rect x="20" y="106" width="60" height="3" rx="1" fill-opacity="0.55"/>
    <rect x="132" y="106" width="36" height="4" rx="2" fill-opacity="0.85"/>
    <line x1="20" y1="118" x2="168" y2="118" stroke="currentColor" stroke-opacity="0.3" stroke-width="2"/>
    <line x1="20" y1="118" x2="60" y2="118" stroke="currentColor" stroke-opacity="0.85" stroke-width="3"/>
    <circle cx="60" cy="118" r="6" fill-opacity="0.95"/>
  </g>

  <!-- dashed bind arrow -->
  <g stroke-opacity="0.7" stroke-dasharray="3 3" stroke-width="1.3" fill="none">
    <line x1="178" y1="90" x2="194" y2="90"/>
    <polyline points="188,84 194,90 188,96" fill="currentColor" stroke="none" fill-opacity="0.7"/>
  </g>

  <!-- Scenario output card -->
  <rect x="200" y="44" width="100" height="84" rx="4" fill-opacity="0.1"/>
  <rect x="200.5" y="44.5" width="99" height="83" rx="4" fill="none" stroke="currentColor" stroke-opacity="0.55"/>
  <rect x="210" y="54" width="56" height="4" rx="2" fill-opacity="0.5"/>
  <rect x="210" y="66" width="72" height="14" rx="2" fill-opacity="0.9"/>
  <polygon points="210,92 216,84 222,92" fill-opacity="0.8"/>
  <rect x="228" y="86" width="36" height="4" rx="2" fill-opacity="0.55"/>
  <!-- mini spark -->
  <polyline points="210,116 220,108 230,112 240,102 250,108 260,100 270,104 286,96"
            fill="none" stroke="currentColor" stroke-opacity="0.5" stroke-width="1.3"/>

  <!-- Reset button -->
  <rect x="20" y="140" width="80" height="22" rx="11" fill-opacity="0.1"/>
  <rect x="20.5" y="140.5" width="79" height="21" rx="11" fill="none" stroke="currentColor" stroke-opacity="0.6"/>
  <g transform="translate(32,151)" stroke="currentColor" stroke-opacity="0.85" stroke-width="1.4" fill="none">
    <path d="M0 0 a5 5 0 1 1 3 -3"/>
    <polyline points="3,-3 3,-7 0,-4"/>
  </g>
  <rect x="46" y="149" width="44" height="4" rx="2" fill-opacity="0.8"/>

  <!-- baseline hint -->
  <rect x="120" y="148" width="180" height="3" rx="1" fill-opacity="0.25"/>
</g>
</svg>
